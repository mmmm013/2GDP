PIPELINE ORDER (DO NOT CHANGE)

1) PIX (source of truth)
2) K-KUTs / KKs (derived from PIX only)
3) mini-KUTs / mKs (derived from K-KUTs only)
4) K-UPIDs / KPDs (product layer from K-KUTs)

RULES:
- No mKs without K-KUTs
- No KPDs without K-KUTs
- No direct PIX → mK
- All derivatives must preserve duration integrity
- Supabase storage URLs only for audio

mK SPECIAL CAPTURE RULE:
- held_word is a first-class mini-KUT type.
- Capture line-ending words held long in vocal performance.
- Capture stretched/emphasized sung words such as L-----O-----V-----E.
- held_word mKs are meaning-driven, not timing-driven.
- Timing may support verification/reporting only; it does not define the mK.
