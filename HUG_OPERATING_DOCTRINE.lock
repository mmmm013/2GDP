HUG OPERATING DOCTRINE

All HUGs derive from PIX music, lyric, or both.

HUG TYPES:
- K-KUT / KK
- K-UPID / KPD
- mini-KUT / mK

CORE RULE:
We are not guessing or redesigning.
We execute the locked system unless changed by DMAIC + VOC.

COPY-CAPTURE:
All meaningful words, phrases, exclamations, vocal sounds, held words, emotional anchors, and product-ready captures must be intentionally reviewed, classified, and auditable.

BRAND PURPOSE:
Build and pass forward LOVE:
- caring
- sharing
- wearing

EXPANSION LINES:
- Music inventions
- Jewelry line
- Stuffed animal line

EMOTIONAL PRINCIPLE:
We do not run from emotion.
We stop, turn, face it, and process darkness back to each internal source of light.

ADMIN QUOTE CAPTURE RULE:
- Capture strong admin/founder quotes throughout the project.
- Preserve meaning, urgency, and voice.
- Remove cuss words from stored/public quote assets.
- Exception: "hell" may remain when appropriate.
- Quotes may support doctrine, brand voice, training, sales copy, and artifact creation.

CONTROL RULE:
No silent mutation.
No unapproved rule expansion.
No layer crossing without confirmation.

VOCAL PATTERN USAGE RULE:
- All vocal patterns may be used across products.
- Patterns must be applied in alignment with brand tone:
  warm, inviting, playful, loving, and safe.
- Dark, aggressive, or distressing interpretations are not permitted.
- Lower-tier patterns (e.g., groan, scream) must be used only in softened, positive, or stylized contexts.
- Pattern tiering guides placement:
  Tier 1 = primary product hooks
  Tier 2 = supporting/contextual
  Tier 3 = controlled/stylized only

HUG FORWARDING RULE:
- Launch model is single-hop sharing.
- Purchaser sends the HUG to a recipient.
- Recipient may forward to up to 3 people.
- Those forwarded recipients may not forward again.
- This preserves scarcity, control, and revenue discipline.

HUG PRESENTATION RULE:
- All HUGs carry Sleek & Kool DP presentation logic.
- K-KUTs use standard GPM presentation with Twinkle when appropriate.
- KPDs use enhanced presentation controlled by love-level.
- mini-KUTs use minimized presentation: clean, small, content-first.
- Presentation weight must match HUG type; do not over-dress mKs.
