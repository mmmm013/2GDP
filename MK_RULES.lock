mini-KUT / mK RULES LOCK

mKs derive from PIX music, lyric, or both.
mKs are meaning captures, not timing products.

VALID mK TYPES:
- word
- lyric phrase
- held_word
- vocal_sound
- exclamation

WORD RULE:
- Capture meaningful words only.
- Do NOT capture articles or prepositions as word mKs.
- Articles/prepositions may be captured only if they function as vocal_sound or sound/emotional elements.

HELD_WORD RULE:
- Capture line-ending or emotionally sustained words.
- Example: L-----O-----V-----E.
- held_word is meaning/performance capture, not timing logic.

VOCAL_SOUND RULE:
- Vocal sounds are first-class mKs.
- Examples: oh, ah, mm, yeah, breath, laugh, cry, grit, whisper.

mK INVENTORY SILO RULE:
- mKs accumulate vertically and dramatically.
- mKs are organized by content silo first.
- Same-content mKs are allowed and expected.
- Same content must be distinguished by available attributes:
  vocalist initials, composer initials, gender/voice type, BPM, style, source PIX, novelty, emotional use, and quality rank.
- 4PE-BIZ-MSC stores TOP mKs.
- Novelty mKs are stored separately even when content matches.

NAMING RULE:
- mK naming uses CONTENT ONLY plus either:
  1) vocalist initials OR
  2) composer initials

LOCKED ORDER:
PIX → K-KUTs → mini-KUTs → K-UPIDs

mK SATELLITE SILO RULE:
- Lead-in Words & Sounds is a dedicated satellite silo.
- It captures vocal lead-ins, pickup words, emotional starts, and pre-phrase sounds.
- Examples: yeah, yes, no, oh, well, so, baby, darling, love, dear, now, when, mmm, ah, breath.
- Lead-ins may be words or vocal sounds.
- Lead-ins are stored separately from core lyric/meaning mKs when their function is entrance, setup, emotional ignition, or vocal pickup.
