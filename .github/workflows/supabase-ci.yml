# Supabase CI/CD - BIC-Level MSP
# On PR: lint SQL, validate migrations, BIC gate (no destructive changes without ALLOW_BIC)
# On push to main: apply migrations + seeds to production DB
# Secrets required in GitHub repo settings:
#   DATABASE_URL          - production Supabase DB connection string
#   TEST_DATABASE_URL     - disposable CI DB for migration dry-runs
#   SUPABASE_ACCESS_TOKEN - for supabase CLI commands
#   SUPABASE_PROJECT_ID   - your Supabase project ref

name: Supabase CI/CD

on:
  pull_request:
    paths:
      - 'supabase/migrations/**'
      - 'supabase/seed/**'
      - 'supabase/functions/**'
      - '.github/workflows/supabase-ci.yml'
  push:
    branches: [ main ]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/seed/**'
      - 'supabase/functions/**'
      - '.github/workflows/supabase-ci.yml'

jobs:
  # -----------------------------------------------------------------------
  # PR JOB: Validate migrations, lint SQL, BIC gate
  # -----------------------------------------------------------------------
  validate:
    name: Validate migrations (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Install psql client
        run: sudo apt-get install -y postgresql-client

      - name: Apply migrations in order (dry-run against test DB)
        run: |
          set -e
          for f in $(ls -1 supabase/migrations/*.sql | sort); do
            echo ">>> Applying: $f"
            psql "$TEST_DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Apply seeds (idempotent)
        if: hashFiles('supabase/seed/*.sql') != ''
        run: |
          set -e
          for f in $(ls -1 supabase/seed/*.sql | sort); do
            echo ">>> Seeding: $f"
            psql "$TEST_DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: BIC gate - block destructive changes without ALLOW_BIC
        run: |
          set -e
          if grep -RniE '(^|[^-])\bDROP[[:space:]]+(TABLE|COLUMN)\b' supabase/migrations/ | grep -vi 'ALLOW_BIC'; then
            echo "ERROR: Detected DROP TABLE/COLUMN without -- ALLOW_BIC approval comment."
            echo "Add '-- ALLOW_BIC' to the migration file to explicitly allow this change."
            exit 1
          fi
          echo "BIC gate passed - no unapproved destructive changes."

  # -----------------------------------------------------------------------
  # MAIN PUSH JOB: Apply migrations to production DB
  # -----------------------------------------------------------------------
  migrate:
    name: Apply migrations to production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Install psql client
        run: sudo apt-get install -y postgresql-client

      - name: Apply migrations in order
        run: |
          set -e
          for f in $(ls -1 supabase/migrations/*.sql | sort); do
            echo ">>> Applying: $f"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Apply seeds (idempotent)
        if: hashFiles('supabase/seed/*.sql') != ''
        run: |
          set -e
          for f in $(ls -1 supabase/seed/*.sql | sort); do
            echo ">>> Seeding: $f"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Deploy Edge Functions via Supabase CLI
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          set -e
          npm install -g supabase@latest
          supabase functions deploy magic_link      --project-ref "$SUPABASE_PROJECT_ID"
          supabase functions deploy tenant_provision --project-ref "$SUPABASE_PROJECT_ID"
          supabase functions deploy notify           --project-ref "$SUPABASE_PROJECT_ID"
          supabase functions deploy get-stream-url   --project-ref "$SUPABASE_PROJECT_ID"
          supabase functions deploy stream-audio     --project-ref "$SUPABASE_PROJECT_ID"

      - name: Smoke test - get-stream-url healthcheck
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_FUNCTION_URL: ${{ secrets.SUPABASE_FUNCTION_URL }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${SUPABASE_FUNCTION_URL}/get-stream-url" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"track_id":"healthcheck"}')
          # Expect 400 (missing asset) not 500 (crash) - proves function is up
          if [ "$STATUS" = "500" ]; then
            echo "FAIL: get-stream-url returned 500 after deploy"
            exit 1
          fi
          echo "Smoke test passed (status: $STATUS)"
