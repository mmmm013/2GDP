# Supabase CI/CD - BIC-Level MSP
# On PR: lint SQL, validate migrations, BIC gate (no destructive changes without ALLOW_BIC)
# On push to main: apply migrations + seeds to production DB via Supabase CLI
# Secrets required in GitHub repo settings:
#   SUPABASE_ACCESS_TOKEN  - for supabase CLI commands
#   SUPABASE_PROJECT_ID    - your Supabase project ref
#   SUPABASE_ANON_KEY      - for smoke tests
#   SUPABASE_FUNCTION_URL  - e.g. https://<ref>.supabase.co/functions/v1
#   DATABASE_URL           - (optional) direct psql connection for PR dry-runs

name: Supabase CI/CD

on:
  pull_request:
    paths:
      - 'supabase/migrations/**'
      - 'supabase/seed/**'
      - 'supabase/functions/**'
      - '.github/workflows/supabase-ci.yml'
  push:
    branches: [ main ]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/seed/**'
      - 'supabase/functions/**'
      - '.github/workflows/supabase-ci.yml'

jobs:
  # -----------------------------------------------------------------------
  # PR JOB: Validate migrations, lint SQL, BIC gate
  # -----------------------------------------------------------------------
  validate:
    name: Validate migrations (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        run: npm install -g supabase@latest

      - name: Lint migrations (syntax check)
        run: |
          set -e
          for f in $(ls -1 supabase/migrations/*.sql | sort); do
            echo ">>> Checking: $f"
            # Basic syntax: ensure file is valid SQL (non-empty, no truncation)
            [ -s "$f" ] || (echo "ERROR: Empty migration file $f" && exit 1)
          done
          echo "Migration lint passed."

      - name: BIC gate - block destructive changes without ALLOW_BIC
        run: |
          set -e
          if grep -RniE '(^|[^-])\bDROP[[:space:]]+(TABLE|COLUMN)\b' supabase/migrations/ | grep -vi 'ALLOW_BIC'; then
            echo "ERROR: Detected DROP TABLE/COLUMN without -- ALLOW_BIC approval comment."
            echo "Add '-- ALLOW_BIC' to the migration file to explicitly allow this change."
            exit 1
          fi
          echo "BIC gate passed - no unapproved destructive changes."

  # -----------------------------------------------------------------------
  # MAIN PUSH JOB: Apply migrations + deploy functions to production
  # -----------------------------------------------------------------------
  migrate:
    name: Apply migrations to production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        run: npm install -g supabase@latest

      - name: Apply migrations via Supabase CLI (db push)
        run: |
          set -e
          supabase db push --project-ref "$SUPABASE_PROJECT_ID"
          echo "Migrations applied successfully."

      - name: Apply seeds (idempotent)
        if: hashFiles('supabase/seed/*.sql') != ''
        run: |
          set -e
          supabase db execute --project-ref "$SUPABASE_PROJECT_ID" \
            --file supabase/seed/seed.sql || echo "Seed skipped or already applied."

      - name: Deploy Edge Functions via Supabase CLI
        run: |
          set -e
          for fn in magic_link tenant_provision notify get-stream-url stream-audio \
                    play-k-kut play-k-kut-lower send-k-kuts \
                    gmarketingoptin gmarketingoptout trackssearch gemini_proxy; do
            echo ">>> Deploying: $fn"
            supabase functions deploy "$fn" --project-ref "$SUPABASE_PROJECT_ID"
          done
          echo "All Edge Functions deployed."

      - name: Smoke test - get-stream-url healthcheck
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_FUNCTION_URL: ${{ secrets.SUPABASE_FUNCTION_URL }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${SUPABASE_FUNCTION_URL}/get-stream-url" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"track_id":"healthcheck"}')
          # Expect 400 (missing asset) not 500 (crash) - proves function is up
          if [ "$STATUS" = "500" ]; then
            echo "FAIL: get-stream-url returned 500 after deploy"
            exit 1
          fi
          echo "Smoke test passed (status: $STATUS)"

      - name: Smoke test - send-k-kuts healthcheck
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_FUNCTION_URL: ${{ secrets.SUPABASE_FUNCTION_URL }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${SUPABASE_FUNCTION_URL}/send-k-kuts" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"k_kut_id":"healthcheck"}')
          if [ "$STATUS" = "500" ]; then
            echo "FAIL: send-k-kuts returned 500 after deploy"
            exit 1
          fi
          echo "send-k-kuts smoke test passed (status: $STATUS)"
