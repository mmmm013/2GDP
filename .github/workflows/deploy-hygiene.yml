name: Deploy Hygiene

on:
  pull_request:
  push:
    branches: [main]

jobs:
  deploy-hygiene:
    name: Enforce deploy isolation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy hygiene check
        run: npm run deploy:hygiene
