name: Supabase DB migrations

on:
  push:
    branches:
      - main
      - develop
      - feature/**    # adjust to your branching model
    paths:
      - "supabase/**" # only run when DB/migrations change

jobs:
  migrate-db:
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID:  ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Check required secrets
        id: secrets-check
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_ID" ]; then
            echo "::warning::SUPABASE_ACCESS_TOKEN or SUPABASE_PROJECT_ID secret is not set — skipping migration."
            echo "Add these in GitHub → Settings → Secrets and variables → Actions."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Link Supabase project
        if: steps.secrets-check.outputs.skip != 'true'
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Apply migrations (push)
        if: steps.secrets-check.outputs.skip != 'true'
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "Running supabase db push against main (live) project…"
            supabase db push --non-interactive
          else
            echo "Running supabase db push in dry-run mode for non-main branch…"
            supabase db push --dry-run --non-interactive
          fi
