name: Supabase DB migrations

on:
  push:
    branches:
      - main
      - develop
      - feature/**    # adjust to your branching model
    paths:
      - "supabase/**" # only run when DB/migrations change

jobs:
  migrate-db:
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID:  ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Apply migrations (push)
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "Running supabase db push against main (live) project…"
            supabase db push --non-interactive
          else
            echo "Running supabase db push in dry-run mode for non-main branch…"
            supabase db push --dry-run --non-interactive
          fi
